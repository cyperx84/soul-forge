version: 2

builds:
  - binary: soul-forge
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X github.com/cyperx84/soul-forge/cmd.Version={{.Version}}

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - README.md
      - LICENSE

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

# Homebrew: publish a formula that installs the prebuilt binary (no Go build needed)
# into the cyperx84/homebrew-tap repo. Requires TAP_TOKEN with write access to it.
brews:
  - name: soul-forge
    repository:
      owner: cyperx84
      name: homebrew-tap
      token: "{{ .Env.TAP_TOKEN }}"
    homepage: "https://github.com/cyperx84/soul-forge"
    description: "Compile AI-agent instruction files from a tagged fragment corpus"
    license: "MIT"
    install: |
      bin.install "soul-forge"
    test: |
      system "#{bin}/soul-forge", "--version"

release:
  github:
    owner: cyperx84
    name: soul-forge
